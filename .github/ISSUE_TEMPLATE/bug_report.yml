name: 🐛 Bug 报告
description: 提交问题或故障报告
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢提交 Bug 报告！
        请尽可能详细地描述问题，以便我们快速定位和修复。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述该 Bug 的表现
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现该问题？
      placeholder: |
        1. 配置 MCP 服务 '...'
        2. 调用工具 '...'
        3. 看到错误 '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你认为应该发生什么？

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 请粘贴相关的错误输出或日志
      render: shell

  - type: input
    id: version
    attributes:
      label: 版本号
      description: 你使用的版本号
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 运行环境
      options:
        - macOS
        - Windows
        - Linux
        - Docker