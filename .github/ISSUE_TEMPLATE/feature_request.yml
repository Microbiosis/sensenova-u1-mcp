name: 🚀 功能请求
description: 对新功能或改进的建议
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢你的建议！
        请描述你希望看到的新功能或改进。

  - type: textarea
    id: problem
    attributes:
      label: 相关痛点
      description: 这个功能解决了什么问题？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望如何实现这个功能？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 有没有其他你考虑过的方案？